<!DOCTYPE html>
<html lang="en">
<head>
    <title>3D-Web1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img class="image-gradient" src="gradient.png" alt="gradient">
    <div class="layer-blur"></div>

    <!------------------------ Navbar ----------------------->

    <div class="container">
        <header>
            <img src="Logo.png" alt="burnitup">

            <nav>
                <a href="#"> HOME</a>
                <a href="#"> FEATURES</a>
                <a href="#"> SERVICES</a>
                <a href="#"> CONTACT</a>
            </nav>

            <button class="btn-signing">SIGN IN</button>
        </header>

        <!------------------- Hero Section ------------------->

        <main>
            <div class="content">
                <div class="tag-box">
                    <div class="tag">On Fire</div>
                </div>
        
                <h1>Build. Design.<br>Inspire.</h1>
        
                <p class="description">
                    From modern web development to cinematic CGI <br>and motion graphics, Burn It Up transforms bold<br> ideas

                    <a href="#" class="btn-get-started">Connect Me > </a>
                    <a href="#" class="btn-signing-main">View More</a>
                </div>
            </div>
        </main>


        <!------------------- Spline Section ------------------->

        
        <spline-viewer class="spline" url="https://prod.spline.design/0MaNsLk03MPBB23w/scene.splinecode"></spline-viewer>


    </div>

    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.98/build/spline-viewer.js"></script>
